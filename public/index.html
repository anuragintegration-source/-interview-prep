<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Prep AI</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #6c63ff;
      --accent2: #4ecdc4;
      --danger: #ff6b6b;
      --warn: #ffd93d;
      --text: #e8eaf0;
      --text-muted: #8b92a9;
      --border: #2e3248;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    header {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 20px; font-weight: 700; }
    header span { color: var(--accent); }

    /* Main layout */
    .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

    /* Form card */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 32px;
    }
    .form-card h2 { font-size: 22px; margin-bottom: 6px; }
    .form-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    @media (max-width: 700px) { .form-row { grid-template-columns: 1fr; } }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input, .field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field select option { background: var(--surface2); }

    .btn-generate {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border: none;
      border-radius: 10px;
      padding: 14px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .btn-generate:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Status bar */
    #status-bar {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 14px 20px;
      margin-bottom: 24px;
      font-size: 14px;
      color: var(--accent);
      display: none;
      align-items: center;
      gap: 10px;
    }
    #status-bar.visible { display: flex; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    #results { display: none; }
    #results.visible { display: block; }

    /* Company Overview */
    .overview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }
    @media (max-width: 700px) { .overview-grid { grid-template-columns: 1fr; } }

    .overview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .overview-card h3 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--accent2);
      margin-bottom: 10px;
    }
    .overview-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

    /* Section headers */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      margin-top: 32px;
    }
    .section-header h2 { font-size: 20px; }
    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .section-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .icon-hr { background: rgba(255, 107, 107, 0.15); }
    .icon-tech { background: rgba(108, 99, 255, 0.15); }
    .icon-company { background: rgba(78, 205, 196, 0.15); }

    /* Q&A Cards */
    .qa-list { display: flex; flex-direction: column; gap: 14px; }

    .qa-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .qa-header {
      padding: 16px 20px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      user-select: none;
      transition: background 0.15s;
    }
    .qa-header:hover { background: var(--surface2); }
    .qa-number {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-top: 2px;
    }
    .qa-question { font-size: 15px; font-weight: 600; flex: 1; line-height: 1.5; }
    .qa-chevron {
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 4px;
      transition: transform 0.2s;
    }
    .qa-card.open .qa-chevron { transform: rotate(180deg); }

    .qa-body {
      display: none;
      padding: 0 20px 20px 20px;
      border-top: 1px solid var(--border);
    }
    .qa-card.open .qa-body { display: block; }

    .qa-tag {
      display: inline-block;
      margin-bottom: 12px;
      margin-top: 14px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .tag-why { background: rgba(255, 217, 61, 0.15); color: var(--warn); }
    .tag-answer { background: rgba(108, 99, 255, 0.15); color: var(--accent); }
    .tag-tip { background: rgba(78, 205, 196, 0.15); color: var(--accent2); }
    .tag-context { background: rgba(255, 107, 107, 0.15); color: var(--danger); }

    .tag-easy { background: rgba(78, 205, 196, 0.15); color: var(--accent2); }
    .tag-medium { background: rgba(255, 217, 61, 0.15); color: var(--warn); }
    .tag-hard { background: rgba(255, 107, 107, 0.15); color: var(--danger); }

    .qa-body p { font-size: 14px; color: var(--text-muted); line-height: 1.7; }
    .qa-body code {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 13px;
      color: var(--accent2);
    }
    .qa-body pre {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-top: 10px;
      overflow-x: auto;
      font-family: monospace;
      font-size: 13px;
      color: var(--accent2);
      line-height: 1.5;
    }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 8px 0; }

    /* Error */
    .error-card {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: var(--radius);
      padding: 16px 20px;
      color: var(--danger);
      font-size: 14px;
    }

    /* Print/export button */
    .export-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 24px;
    }
    .btn-export {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-export:hover { color: var(--text); border-color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="logo">🎯</div>
  <h1>Interview Prep <span>AI</span></h1>
</header>

<div class="container">

  <!-- Form -->
  <div class="form-card">
    <h2>Prepare for Your Interview</h2>
    <p>Enter the company and your domain — get tailored questions, answers, and insider tips powered by AI.</p>

    <div class="form-row">
      <div class="field">
        <label>Company Name</label>
        <input type="text" id="company" placeholder="e.g. Google, Amazon, Infosys" />
      </div>
      <div class="field">
        <label>Domain / Role</label>
        <select id="domain">
          <option value="">Select domain...</option>
          <optgroup label="Engineering">
            <option value="Software Engineering (Backend)">Software Engineering – Backend</option>
            <option value="Software Engineering (Frontend)">Software Engineering – Frontend</option>
            <option value="Full Stack Development">Full Stack Development</option>
            <option value="Data Engineering">Data Engineering</option>
            <option value="DevOps & Cloud Engineering">DevOps & Cloud Engineering</option>
            <option value="Mobile Development (Android/iOS)">Mobile Development</option>
            <option value="Machine Learning Engineering">Machine Learning Engineering</option>
            <option value="Embedded Systems">Embedded Systems</option>
          </optgroup>
          <optgroup label="Data & AI">
            <option value="Data Science">Data Science</option>
            <option value="Data Analytics">Data Analytics</option>
            <option value="AI/ML Research">AI / ML Research</option>
            <option value="Business Intelligence">Business Intelligence</option>
          </optgroup>
          <optgroup label="Product & Design">
            <option value="Product Management">Product Management</option>
            <option value="UX/UI Design">UX / UI Design</option>
            <option value="Product Design">Product Design</option>
          </optgroup>
          <optgroup label="Business & Management">
            <option value="Business Analyst">Business Analyst</option>
            <option value="Project Management">Project Management</option>
            <option value="Management Consulting">Management Consulting</option>
            <option value="Operations Management">Operations Management</option>
          </optgroup>
          <optgroup label="Finance">
            <option value="Investment Banking">Investment Banking</option>
            <option value="Financial Analysis">Financial Analysis</option>
            <option value="Risk Management">Risk Management</option>
          </optgroup>
          <optgroup label="Other">
            <option value="Human Resources">Human Resources</option>
            <option value="Marketing">Marketing</option>
            <option value="Sales">Sales</option>
            <option value="Customer Success">Customer Success</option>
          </optgroup>
        </select>
      </div>
      <div class="field">
        <label>Experience Level</label>
        <select id="level">
          <option value="">Select level...</option>
          <option value="Fresher / Entry-Level (0–1 years)">Fresher / Entry-Level</option>
          <option value="Junior (1–3 years)">Junior (1–3 years)</option>
          <option value="Mid-Level (3–6 years)">Mid-Level (3–6 years)</option>
          <option value="Senior (6–10 years)">Senior (6–10 years)</option>
          <option value="Lead / Principal (10+ years)">Lead / Principal (10+ years)</option>
        </select>
      </div>
    </div>

    <button class="btn-generate" id="generate-btn" onclick="generate()">
      ✨ Generate Interview Questions
    </button>
  </div>

  <!-- Status -->
  <div id="status-bar">
    <div class="spinner"></div>
    <span id="status-text">Generating...</span>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="export-row">
      <button class="btn-export" onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>
    <div id="results-content"></div>
  </div>

</div>

<script>
  let generating = false;

  async function generate() {
    if (generating) return;

    const company = document.getElementById("company").value.trim();
    const domain = document.getElementById("domain").value;
    const level = document.getElementById("level").value;

    if (!company) { alert("Please enter a company name."); return; }
    if (!domain) { alert("Please select a domain."); return; }
    if (!level) { alert("Please select an experience level."); return; }

    generating = true;
    const btn = document.getElementById("generate-btn");
    btn.disabled = true;
    btn.textContent = "⏳ Generating...";

    const statusBar = document.getElementById("status-bar");
    statusBar.classList.add("visible");
    setStatus("Connecting to AI...");

    const results = document.getElementById("results");
    results.classList.remove("visible");

    try {
      const response = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ company, domain, level }),
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          try {
            const event = JSON.parse(line.slice(6));
            if (event.type === "status") {
              setStatus(event.message);
            } else if (event.type === "result") {
              renderResults(event.data, company, domain, level);
            } else if (event.type === "error") {
              showError(event.message);
            }
          } catch (_) {}
        }
      }
    } catch (err) {
      showError("Network error: " + err.message);
    } finally {
      generating = false;
      btn.disabled = false;
      btn.textContent = "✨ Generate Interview Questions";
      statusBar.classList.remove("visible");
    }
  }

  function setStatus(msg) {
    document.getElementById("status-text").textContent = msg;
  }

  function showError(msg) {
    const el = document.getElementById("results-content");
    el.innerHTML = `<div class="error-card">❌ ${msg}</div>`;
    document.getElementById("results").classList.add("visible");
  }

  function renderResults(data, company, domain, level) {
    const el = document.getElementById("results-content");
    el.innerHTML = "";

    // Company Overview
    const ov = data.company_overview || {};
    el.innerHTML += `
      <div class="section-header" style="margin-top:0">
        <div class="section-icon icon-company">🏢</div>
        <h2>${escHtml(company)} Overview</h2>
        <span class="badge">${escHtml(level.split(" ")[0])} · ${escHtml(domain.split("(")[0].trim())}</span>
      </div>
      <div class="overview-grid">
        ${ovCard("About", ov.about)}
        ${ovCard("Culture & Values", ov.culture)}
        ${ovCard("Recent Highlights", ov.recent_highlights)}
        ${ovCard("Interview Process", ov.interview_process)}
      </div>
    `;

    // HR Questions
    const hr = data.hr_questions || [];
    el.innerHTML += `
      <div class="section-header">
        <div class="section-icon icon-hr">🤝</div>
        <h2>HR & Behavioural Questions</h2>
        <span class="badge">${hr.length} questions</span>
      </div>
      <div class="qa-list">
        ${hr.map((q, i) => `
          <div class="qa-card" onclick="toggleCard(this)">
            <div class="qa-header">
              <span class="qa-number">Q${i + 1}</span>
              <span class="qa-question">${escHtml(q.question)}</span>
              <span class="qa-chevron">▼</span>
            </div>
            <div class="qa-body">
              ${q.why_asked ? `<span class="qa-tag tag-why">💡 What they look for</span><p>${escHtml(q.why_asked)}</p><div class="divider"></div>` : ""}
              <span class="qa-tag tag-answer">✍️ Sample Answer (STAR Method)</span>
              <p>${formatText(q.sample_answer)}</p>
            </div>
          </div>
        `).join("")}
      </div>
    `;

    // Technical Questions
    const tech = data.domain_questions || [];
    el.innerHTML += `
      <div class="section-header">
        <div class="section-icon icon-tech">💻</div>
        <h2>Technical / Domain Questions</h2>
        <span class="badge">${tech.length} questions</span>
      </div>
      <div class="qa-list">
        ${tech.map((q, i) => `
          <div class="qa-card" onclick="toggleCard(this)">
            <div class="qa-header">
              <span class="qa-number">Q${i + 1}</span>
              <span class="qa-question">${escHtml(q.question)}</span>
              <span class="qa-chevron">▼</span>
            </div>
            <div class="qa-body">
              ${q.difficulty ? `<span class="qa-tag tag-${q.difficulty.toLowerCase()}">${q.difficulty}</span>` : ""}
              <span class="qa-tag tag-answer" style="margin-left:${q.difficulty ? "8px" : "0"}">📖 Answer</span>
              <p>${formatText(q.answer)}</p>
              ${q.tip ? `<div class="divider"></div><span class="qa-tag tag-tip">💬 Interview Tip</span><p>${escHtml(q.tip)}</p>` : ""}
            </div>
          </div>
        `).join("")}
      </div>
    `;

    // Company-Specific Questions
    const cs = data.company_specific_questions || [];
    el.innerHTML += `
      <div class="section-header">
        <div class="section-icon icon-company">🎯</div>
        <h2>${escHtml(company)}-Specific Questions</h2>
        <span class="badge">${cs.length} questions</span>
      </div>
      <div class="qa-list">
        ${cs.map((q, i) => `
          <div class="qa-card" onclick="toggleCard(this)">
            <div class="qa-header">
              <span class="qa-number">Q${i + 1}</span>
              <span class="qa-question">${escHtml(q.question)}</span>
              <span class="qa-chevron">▼</span>
            </div>
            <div class="qa-body">
              ${q.context ? `<span class="qa-tag tag-context">🏷️ Why this is asked at ${escHtml(company)}</span><p>${escHtml(q.context)}</p><div class="divider"></div>` : ""}
              <span class="qa-tag tag-answer">✍️ How to Answer</span>
              <p>${formatText(q.answer)}</p>
            </div>
          </div>
        `).join("")}
      </div>
      <div style="height:60px"></div>
    `;

    document.getElementById("results").classList.add("visible");
    el.scrollIntoView({ behavior: "smooth" });
  }

  function ovCard(title, text) {
    if (!text) return "";
    return `
      <div class="overview-card">
        <h3>${escHtml(title)}</h3>
        <p>${escHtml(text)}</p>
      </div>
    `;
  }

  function toggleCard(card) {
    card.classList.toggle("open");
  }

  function escHtml(str) {
    if (!str) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function formatText(str) {
    if (!str) return "";
    // Convert **bold** and inline code and newlines
    return escHtml(str)
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/`(.*?)`/g, "<code>$1</code>")
      .replace(/\n\n/g, "</p><p>")
      .replace(/\n/g, "<br/>");
  }

  // Allow Enter key in company input
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("company").addEventListener("keydown", (e) => {
      if (e.key === "Enter") generate();
    });
  });
</script>

</body>
</html>
